spring:
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:mysql://localhost:3306/cod_build_manager?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${APP_DATASOURCE_USERNAME:root}
    password: ${APP_DATASOURCE_PASSWORD:123456}
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}
      password: ${APP_REDIS_PASSWORD:}
      database: ${APP_REDIS_DATABASE:0}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:cod-build-manager-dev-only-secret-key-change-before-production}
