spring:
  application:
    name: cod-build-manager-api
  profiles:
    default: dev
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: io.github.kuonjiarisu.backend.model
  configuration:
    map-underscore-to-camel-case: true
    arg-name-based-constructor-auto-mapping: true

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  catalog:
    generations:
      - value: BO7
        label: BO7
      - value: WZ
        label: Warzone
  auth:
    access-token-ttl-minutes: ${APP_AUTH_ACCESS_TOKEN_TTL_MINUTES:120}
    captcha-ttl-minutes: ${APP_AUTH_CAPTCHA_TTL_MINUTES:5}
